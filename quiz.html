<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single:wght@100..900&family=Edu+NSW+ACT+Cursive:wght@500&family=Lora:ital,wght@0,600;1,600&family=Montserrat:ital,wght@0,600;1,600&family=Roboto+Condensed:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <style>
    body{
      margin:0;
      background-color: rgb(5, 5, 67);
      color:whitesmoke;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family: "Bitcount Grid Single", system-ui;
      font-optical-sizing: auto;
      font-weight:400;
      font-style: normal;
      font-variation-settings:
        "slnt" 0,
        "CRSV" 0.5,
        "ELSH" 0,
        "ELXP" 0;

    }
    .container{
      width:100%;
      max-width:820px;
      background-color:rgb(35, 35, 116);
      padding:20px;
      border-radius:5px;
      box-shadow:0 0 5px #e6eef6;
    }

    header{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:12px;
        margin-bottom:18px;
    }

    .meta{
        display:flex;
        gap:10px;
        align-items:center
    }

    button{
        background-color: #00CAFF;
        border:1px solid rgba(255,255,255,0.08);
        padding:8px 12px;
        border-radius:8px;
        color:inherit;
        cursor:pointer;
    }

    #quiz{
        min-height:220px;
    }

    .card{
        background:rgb(103, 103, 189);
        padding: 5px 5px 5px 5px;
    }

    .question{
        font-size:1.15rem;
        margin-bottom:14px;
        min-height:3.2em; /* reserve space while typing */
    }

    .options{
        display:grid;
        gap:10px;
    }

    .option{
        padding:12px;
        border:1px solid rgba(255,255,255,0.04);
        cursor:pointer;
        background:transparent;
        text-align:left;
        transition:transform .06s ease, box-shadow .06s ease;
        background-color:rgb(137, 194, 194) ;
        color: black;
    }

    .option[aria-checked="true"]{
        outline:2px solid white;
    }

    .option:focus{
        box-shadow:0 0 10px azure; 
        transform:translateY(-1px)
    }

    .controls{
        display:flex;
        gap:10px;
        margin-top:14px;
        justify-content:flex-end;
        flex-wrap:wrap;
    }

    .hidden{
        display:none;
    }

    #loader{
        opacity:0.9;
    }

    footer{
        margin-top:18px;
        text-align:center
    }

    .muted{
        color:var(--muted);
        font-size:.9rem;
    }

    .top-row{
        display:flex;
        gap:12px;
        align-items:center;
        flex-wrap:wrap
    }

    @media (max-width:520px){
        .controls{justify-content:stretch}.controls button{flex:1}}
  </style>

</head>

<body>
    
  <main class="container" id="app">
    <header>
      <div>
        <h1 style="margin:0;font-size:1.25rem">Quiz!</h1>
      </div>
      <div class="meta top-row">
        <span id="progress">Question 0 / 0</span>
        <span id="highScoreSide" style="min-width:120px">High score: 0</span>
      </div>
    </header>

    <div id="quiz">
      <div id="loader" class="card">Loading questions…</div>
    </div>

    <footer id="result" class="hidden" aria-hidden="true">
      <h2>Your Score</h2>
      <p id="scoreText"></p>
      <p id="highScoreText" class="muted"></p>
      <div style="margin-top:12px">
        <button id="tryAgain">Try again</button>
      </div>
    </footer>
  </main>

  <script id="questions-data" type="application/json">
  [
    {
      "id": 1,
      "question": "Which planet is farthest from the Sun?",
      "options": ["Jupiter", "Neptune", "Saturn", "Earth"],
      "answerIndex": 2
    },
    {
      "id": 2,
      "question": "Which planet is tilted on its side, making its rotation unique?",
      "options": ["Neptune", "Jupiter", "Uranus", "Saturn"],
      "answerIndex": 3
    },
    {
      "id": 3,
      "question": "Which planet has the shortest day (spins fastest)?",
      "options": ["Jupiter", "Saturn", "Earth", "Neptune"],
      "answerIndex": 1
    },
    {
      "id": 4,
      "question": "What is the name of Earth's natural satellite?",
      "options": ["Phobos", "Titan", "The Moon", "Europa"],
      "answerIndex": 3
    },
    {
      "id": 5,
      "question": "Which planet is known as the “Morning Star” or “Evening Star”?",
      "options": ["Venus", "Mercury", "Uranus", "Jupiter"],
      "answerIndex": 1
    },
    {
      "id": 6,
      "question": "Which planet has the most rings?",
      "options": ["Mars", "Saturn", "Uranus", "Jupiter"],
      "answerIndex": 2
    },
    {
      "id": 7,
      "question": "Which planet is not in our solar system”?",
      "options": ["Pluto", "Mercury", "Uranus", "Jupiter"],
      "answerIndex": 1
    },
    {
      "id": 8,
      "question": "What is the largest planet in our solar system?",
      "options": ["Venus", "Mercury", "Uranus", "Jupiter"],
      "answerIndex": 4
    },
    {
      "id": 9,
      "question": "Which planet is known as the Red Planet?",
      "options": ["Venus", "Mercury", "Mars", "Jupiter"],
      "answerIndex": 3
    },
    {
      "id": 10,
      "question": "Which planet is closest to the Sun?",
      "options": ["Venus", "Mercury", "Uranus", "Jupiter"],
      "answerIndex": 2
    }    
  ]
  </script>

  <script>
    
    const quizEl = document.getElementById('quiz');
    const progressEl = document.getElementById('progress');
    const resultEl = document.getElementById('result');
    const loaderEl = document.getElementById('loader');
    const scoreText = document.getElementById('scoreText');
    const highScoreText = document.getElementById('highScoreText');
    const tryAgainBtn = document.getElementById('tryAgain');
    const highScoreSide = document.getElementById('highScoreSide');
    const QUESTIONS_JSON = document.getElementById('questions-data').textContent;

    let questions = [];
    let current = 0;
    let score = 0;
    let answers = [];
    let typingTimer = null;
    const storageKey = 'quiz_highscore_v1';
    let previousHigh = 0;

    function el(tag, props = {}, ...children){
      const node = document.createElement(tag);
      for(const [k,v] of Object.entries(props)){
        if(k === 'class') node.className = v;
        else if(k === 'html') node.innerHTML = v;
        else if(k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
        else node.setAttribute(k, String(v));
      }
      children.forEach(c => node.append(typeof c === 'string' ? document.createTextNode(c) : c));
      return node;
    }

    async function loadQuestions(){
      
      await new Promise(r => setTimeout(r, 80));
      try {
        const parsed = JSON.parse(QUESTIONS_JSON);
        if(!Array.isArray(parsed)) throw new Error('Invalid questions format');
        return parsed;
      } catch(err){
        quizEl.innerHTML = `<div class="card">Error loading questions</div>`;
        return [];
      }
    }

    function typeText(node, text, speed = 20){
      // clear any previous typing
      if(typingTimer) clearTimeout(typingTimer);
      node.textContent = '';
      let i = 0;
      return new Promise(res => {
        function step(){
          if(i <= text.length - 1){
            node.textContent += text.charAt(i);
            i++;
            typingTimer = setTimeout(step, speed);
          } else {
            typingTimer = null;
            res();
          }
        }
        step();
      });
    }

    function renderQuestion(qIdx){
      const q = questions[qIdx];
      if(!q) return;
      progressEl.textContent = `Question ${qIdx + 1} / ${questions.length}`;

      quizEl.innerHTML = ''; 
      const card = el('div', {class: 'card'});
      const qText = el('div', {class:'question'});
      const opts = el('div', {class: 'options', role: 'listbox', tabindex: -1});      

      q.options.forEach((optionText, i) => {
        const isSelected = answers[qIdx] === i;
        const opt = el('button', {
          class: 'option',
          role: 'option',
          'aria-checked': isSelected ? 'true' : 'false',
          onclick: () => selectOption(qIdx, i),
          onmouseover: () => {
            opt.style.backgroundColor = '#f0f0f0';
            opt.style.boxShadow = '0 0 10px azure';
          },
          onmouseout: () => {
            opt.style.backgroundColor = '';
            opt.style.boxShadow = '';
          },
        }, optionText);
        opts.appendChild(opt);
      });

      const controls = el('div', {class:'controls'});
      const prev = el('button', {
        onclick: () => goto(qIdx - 1),
      }, 'Previous');

      const next = el('button', {
        onclick: () => goto(qIdx + 1)
      }, qIdx === questions.length - 1 ? 'Submit' : 'Next');

      controls.append(prev, next);
      card.append(qText, opts, controls);
      quizEl.appendChild(card);

      const numbered = `${qIdx + 1}. ${q.question}`;
      typeText(qText, numbered, 20).then(() => {
      });

    }

    function selectOption(qIdx, optIdx){
      answers[qIdx] = optIdx;
      const optionButtons = quizEl.querySelectorAll('.option');
      optionButtons.forEach((btn, i) => btn.setAttribute('aria-checked', i === optIdx ? 'true' : 'false'));
    }

    function goto(nextIdx){
      if(nextIdx >= questions.length) return submit();
      if(nextIdx < 0) nextIdx = 0;
      current = nextIdx;
      renderQuestion(current);
    }

    function submit(){
      score = 0;
      questions.forEach((q, idx) => {
        const correctIndex = (typeof q.answerIndex === 'number') ? (q.answerIndex - 1) : q.answerIndex;
        if (answers[idx] === correctIndex) score += 1;
      });

      showResult();
    }

    function showResult(){
      quizEl.classList.add('hidden');
      resultEl.classList.remove('hidden');
      resultEl.setAttribute('aria-hidden', 'false');
      scoreText.textContent = `You scored ${score} / ${questions.length} (${Math.round((score/questions.length)*100)}%)`;

      const previous = previousHigh || 0;
      if (score > previous) {
        localStorage.setItem(storageKey, score);
        highScoreText.textContent = `🎉 New high score! Previous: ${previous}`;
      } else {
        highScoreText.textContent = `High score: ${previous}`;
      }
    }

    function restart(){
      answers = [];
      current = 0;
      score = 0;
      previousHigh = Number(localStorage.getItem(storageKey) || '0');
      highScoreSide.textContent = `High score: ${previousHigh}`;
      resultEl.classList.add('hidden');
      quizEl.classList.remove('hidden');
      renderQuestion(0);
    }

   
    tryAgainBtn?.addEventListener('click', restart);

    (async function init(){
      if(loaderEl) loaderEl.classList.remove('hidden');
      questions = await loadQuestions();
      if(loaderEl) loaderEl.classList.add('hidden');
      if(!questions.length) return;

      previousHigh = Number(localStorage.getItem(storageKey) || '0');
      highScoreSide.textContent = `High score: ${previousHigh}`;

      renderQuestion(0);
    })();
  </script>
</body>
</html>
